<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto-BCI Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #18202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        align-items: flex-end;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
      }

      .muted {
        color: #687385;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #dce2ea;
        border-radius: 8px;
        padding: 18px;
      }

      .panel h2 {
        font-size: 14px;
        margin: 0 0 12px;
        text-transform: uppercase;
        letter-spacing: 0;
        color: #4b5a6b;
      }

      .value {
        font-size: 24px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #101820;
        color: #f4f7fb;
        border-radius: 8px;
        padding: 16px;
        overflow: auto;
      }

      a {
        color: #0b63ce;
      }

      @media (max-width: 760px) {
        header,
        .grid {
          display: block;
        }

        .panel {
          margin-bottom: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Auto-BCI Dashboard</h1>
          <p class="muted">Local projection of recorded run artifacts.</p>
        </div>
        <div id="state" class="muted">Loading status...</div>
      </header>

      <section class="grid">
        <div class="panel">
          <h2>Run</h2>
          <div id="run-id" class="value">-</div>
        </div>
        <div class="panel">
          <h2>Task</h2>
          <div id="task-id" class="value">-</div>
        </div>
        <div class="panel">
          <h2>Metric</h2>
          <div id="metric" class="value">-</div>
        </div>
      </section>

      <section class="panel" style="margin-top: 16px">
        <h2>Artifacts</h2>
        <div id="artifacts" class="muted">No artifacts yet.</div>
      </section>

      <section class="panel" style="margin-top: 16px">
        <h2>Raw Status</h2>
        <pre id="raw">{}</pre>
      </section>
    </main>

    <script>
      async function loadStatus() {
        const response = await fetch("/status.json", { cache: "no-store" });
        const status = await response.json();
        const run = status.latest_run || null;
        document.getElementById("state").textContent = status.ok ? "Ready" : "Needs attention";
        document.getElementById("run-id").textContent = run ? run.run_id : "-";
        document.getElementById("task-id").textContent = run ? run.task_id : "-";
        document.getElementById("metric").textContent =
          run && run.metrics ? `${run.primary_metric}: ${Number(run.metrics[run.primary_metric]).toFixed(3)}` : "-";
        if (run && run.artifact_refs) {
          document.getElementById("artifacts").innerHTML = Object.entries(run.artifact_refs)
            .map(([name, path]) => `<div><strong>${name}</strong>: ${path}</div>`)
            .join("");
        }
        document.getElementById("raw").textContent = JSON.stringify(status, null, 2);
      }

      loadStatus().catch((error) => {
        document.getElementById("state").textContent = "Failed to load status";
        document.getElementById("raw").textContent = String(error);
      });
    </script>
  </body>
</html>
